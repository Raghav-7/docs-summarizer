<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - WhatsApp Summarizer AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .login-card {
            max-width: 400px;
            margin: 0 auto;
        }
        .flash-messages {
            color: #ef4444;
            font-size: 0.9rem;
            margin-bottom: 16px;
            text-align: center;
        }
    </style>
</head>
<body>
    <main class="container">
        <header>
            <h1>Admin Access</h1>
            <p>Secure login required to access the summarizer.</p>
        </header>

        <section class="card login-card">
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <div class="flash-messages">
                  {% for message in messages %}
                    <p>{{ message }}</p>
                  {% endfor %}
                </div>
              {% endif %}
            {% endwith %}

            <form action="{{ url_for('login') }}" method="POST" class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
                
                <label for="password" style="margin-top: 12px;">Password</label>
                <input type="password" id="password" name="password" required>
                
                <button type="submit" class="btn primary mt-4" style="width: 100%;">Login</button>
            </form>
        </section>
    </main>
</body>
</html>
